---
# Service exposing the virthorn-webhook server to the Kubernetes API server.
# The webhook server listens on port 8443 (HTTPS).
apiVersion: v1
kind: Service
metadata:
  name: virthorn-webhook
  namespace: kube-system
  labels:
    app: virthorn-webhook
spec:
  selector:
    app: virthorn-webhook
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP

---
# MutatingWebhookConfiguration — intercepts pod creation for:
#   1. virt-launcher pods (any namespace, identified by kubevirt.io/domain label)
#   2. share-manager pods (longhorn-system namespace, identified by app label)
#
# The caBundle field is intentionally left empty here; the webhook server
# patches it with the self-signed CA certificate at startup.
#
# failurePolicy: Ignore — if the webhook is unavailable, pods are admitted
# normally. This prevents the webhook from becoming a cluster-wide outage.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: virthorn-webhook
  labels:
    app: virthorn-webhook
webhooks:
  # Rule 1: virt-launcher pods in any namespace.
  # KubeVirt sets the label kubevirt.io=virt-launcher on all virt-launcher pods.
  # Note: the label key is "kubevirt.io" (not "kubevirt.io/domain").
  - name: virt-launcher.virthorn-webhook.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    reinvocationPolicy: Never
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    objectSelector:
      matchExpressions:
        - key: kubevirt.io
          operator: In
          values: ["virt-launcher"]
    clientConfig:
      service:
        name: virthorn-webhook
        namespace: kube-system
        path: /mutate
        port: 443
      caBundle: ""   # patched at startup by the webhook server

  # Rule 2: share-manager pods in longhorn-system.
  # Longhorn sets longhorn.io/component=share-manager on share-manager pods.
  # Note: Longhorn does NOT set app=longhorn-share-manager; the actual label is
  # longhorn.io/component=share-manager.
  - name: share-manager.virthorn-webhook.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    reinvocationPolicy: Never
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: longhorn-system
    objectSelector:
      matchExpressions:
        - key: longhorn.io/component
          operator: In
          values: ["share-manager"]
    clientConfig:
      service:
        name: virthorn-webhook
        namespace: kube-system
        path: /mutate
        port: 443
      caBundle: ""   # patched at startup by the webhook server
