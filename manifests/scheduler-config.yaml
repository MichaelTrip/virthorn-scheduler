---
# ConfigMap holding the KubeSchedulerConfiguration for virthorn-scheduler.
# This registers the LonghornCoSchedule plugin at the Filter, Score, and
# PreBind extension points, alongside all default plugins.
#
# PreBind is used (not PostBind) because it fires BEFORE the binding API call:
# kubelet has not yet seen the pod's nodeName, so no VolumeAttachment has been
# created and Longhorn has not yet decided where to attach the volume engine.
# Writing spec.nodeID here guarantees Longhorn sees the target node before it
# processes any VolumeAttachment for the pod.
apiVersion: v1
kind: ConfigMap
metadata:
  name: virthorn-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: true
      resourceName: virthorn-scheduler
      resourceNamespace: kube-system
    profiles:
      - schedulerName: virthorn-scheduler
        plugins:
          filter:
            enabled:
              - name: LonghornCoSchedule
          score:
            enabled:
              - name: LonghornCoSchedule
          preBind:
            enabled:
              - name: LonghornCoSchedule
        pluginConfig:
          - name: LonghornCoSchedule
            args: {}
